#  #S = Session Name
#  #I = Window Index
#  #W = Window Name



set -g status-justify "left"
set -g status "on"

# Basic status bar colors
set-option -g status-style "fg=white,bg=#212121"

# Left side of status bar
set-option -g status-left-length 40
set-option -g status-left "#[fg=#828997,bg=#282c34] #S#[fg=#282c34,bg=#212121]\ue0b4"

# # Window status
set-option -g window-status-format "#[fg=#828997,bg=default] #W"
set-option -g window-status-current-format "#[fg=#61afef,bold,bg=default] #W"
set-option -g window-status-separator "#[fg=#828997] •"

# Right side of status bar
set-option -g status-right-length 40
set-option -g status-right "#[fg=#828997,bg=#212121]%R" # Time, in HH:MM

# Pane border
set-option -g pane-border-style bg=default
set-option -g pane-border-style fg=brightblack
set-option -g pane-active-border-style bg=default
set-option -g pane-active-border-style fg=white

# Pane number indicator
set-option -g display-panes-colour brightblack
set-option -g display-panes-active-colour brightwhite

# Clock mode (Prefix + t)
set-option -g clock-mode-colour white
set-option -g clock-mode-style 24

# Message
set-option -g message-style bg=#212121
set-option -g message-style fg=#e06c75


# List of plugins
set -g @tpm_plugins '                 \
    tmux-plugins/tpm                  \
    tmux-plugins/tmux-sensible        \
    tmux-plugins/tmux-resurrect       \
    tmux-plugins/tmux-continuum       \
    tmux-plugins/tmux-yank            \
    tmux-plugins/tmux-copycat         \
    tmux-plugins/tmux-sidebar         \
    christoomey/vim-tmux-navigator    \
    nhdaly/tmux-better-mouse-mode     \
    sainnhe/tmux-fzf                  \
'
# Last saved environment is automatically restored when tmux is started:
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
