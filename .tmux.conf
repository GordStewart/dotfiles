set -s default-terminal tmux-256color
set-option -sa terminal-overrides ,xterm-256color:RGB

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

set-option -g repeat-time 0
set -g status-interval 2

# Mouse Control
set -g mouse on

# Recommended for Neovim
set-option -sg escape-time 10
set-option -g focus-events on

# Set window titles automatically to running program
set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -g set-titles-string 'tmux - #W'

set -g @scroll-speed-num-lines-per-scroll 5
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"
set -g @sidebar-tree-command 'tree -C'

# Highlight with copy mode and press Shift-S to search
set -g @open-S 'https://www.duckduckgo.com/'

#set -g @tmux-fzf-launch-key 'S-f'
bind-key "f" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh attach"
bind-key "P" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/window.sh switch"

# Visual Activity Monitoring between windows
setw -g monitor-activity on
set -g visual-activity on

# set -g @yank_selection_mouse 'clipboard' # or 'primary' or 'secondary'

###### Keys #############

# Hotkeys using Alt/Option as a modifier
bind-key -n M-n new-window -c "#{pane_current_path}"
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9
bind-key -n M-0 select-window -t :0
# bind-key -n M-. select-window -n
# bind-key -n M-, select-window -p
bind-key -n M-< swap-window -t -1
bind-key -n M-> swap-window -t +1
bind-key -n M-X confirm-before "kill-window"
bind-key -n M-- split-window -v -c "#{pane_current_path}"
# bind-key -n M-\ split-window -h -c "#{pane_current_path}"
bind-key -n M-v split-window -h -c "#{pane_current_path}"
bind-key -n M-V split-window -v -c "#{pane_current_path}"
bind-key -n M-R command-prompt -I "#W" "rename-window '%%'"

bind-key -n M-f resize-pane -Z
bind-key -n "M-H" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -L; tmux swap-pane -t $old'
bind-key -n "M-J" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -D; tmux swap-pane -t $old'
bind-key -n "M-K" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -U; tmux swap-pane -t $old'
bind-key -n "M-L" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -R; tmux swap-pane -t $old'
bind-key -n "M-S-Left" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -L; tmux swap-pane -t $old'
bind-key -n "M-S-Down" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -D; tmux swap-pane -t $old'
bind-key -n "M-S-Up" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -U; tmux swap-pane -t $old'
bind-key -n "M-S-Right" run-shell 'old=`tmux display -p "#{pane_index}"`; tmux select-pane -R; tmux swap-pane -t $old'
bind-key -n M-x confirm-before "kill-pane"

# Remap prefix from 'C-b' to 'C-space'
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# resize panes with Shift + vim movement keys 
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -T 5


# Vi copy-paste mode
set-window-option -g mode-keys vi
set -g @shell_mode 'vi'
set -g status-keys vi

# Copy / Paste Mode
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi 'H' send -X start-of-line
bind-key -T copy-mode-vi 'L' send -X end-of-line
bind-key -T copy-mode-vi 'J' send -X cursor-down\; send -X cursor-down\; send -X cursor-down\; send -X cursor-down\; send -X cursor-down
bind-key -T copy-mode-vi 'K' send -X cursor-up\; send -X cursor-up\; send -X cursor-up\; send -X cursor-up\; send -X cursor-up
bind-key -T copy-mode-vi Escape send -X cancel

# Ctrl + a + Pagedown : Next window
#unbind Pagedown
unbind Pagedown
bind-key Pagedown next-window

# Ctrl + a + Pagup : Previous window
#unbind Pageup
unbind Pageup
bind-key Pageup previous-window
# reload config file
bind r source-file ~/.tmux.conf
